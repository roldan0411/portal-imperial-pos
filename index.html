<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0A0A0A">
<title>Portal Imperial — Sistema POS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* ==========================================================================
   PORTAL IMPERIAL — Sistema POS · Tema Imperial (oscuro laca + dorado)
   WALLACE COMPANY SYSTEM
   ========================================================================== */
:root{
  --red:#C0392B; --red-dark:#922B21; --red-light:#E74C3C;
  --gold:#D4AF37; --gold-light:#F0D060; --gold-dark:#A08020;
  --black:#0A0A0A; --dark:#131316; --dark2:#1C1C21; --dark3:#24242B; --dark4:#313139;
  --gray:#444; --gray2:#666; --gray3:#8a8a8a; --light:#CCC; --white:#F5F0E8;
  --green:#27AE60; --green-l:#2ECC71; --amber:#E67E22;
  --shadow:0 6px 28px rgba(0,0,0,.55); --shadow-lg:0 12px 40px rgba(0,0,0,.6);
  --shadow-gold:0 6px 24px rgba(212,175,55,.18);
  --radio:14px; --radio-lg:20px; --radio-sm:10px;
  /* Alias para compatibilidad con clases de la lógica */
  --tinta:var(--black); --laca:var(--dark); --laca-2:var(--dark2); --laca-borde:rgba(212,175,55,.14);
  --rojo:var(--red); --rojo-vivo:var(--red-light); --oro:var(--gold); --oro-suave:var(--gold-light);
  --texto:var(--white); --texto-2:var(--light); --texto-3:var(--gray3);
  --verde:var(--green-l); --verde-bg:rgba(39,174,96,.15);
  --amar:var(--amber); --amar-bg:rgba(230,126,34,.15);
  --rojo-al:var(--red-light); --rojo-bg:rgba(192,57,43,.2);
  --radio-sm2:var(--radio-sm);
}
*{ box-sizing:border-box; margin:0; padding:0; }
html,body{ height:100%; }
body{
  font-family:'Inter',system-ui,sans-serif;
  background:radial-gradient(ellipse at top, #16161c 0%, var(--black) 60%);
  color:var(--white); min-height:100vh; overflow-x:hidden;
  -webkit-tap-highlight-color:transparent; -webkit-font-smoothing:antialiased;
}
#app{ min-height:100vh; }
::-webkit-scrollbar{ width:7px; height:7px; }
::-webkit-scrollbar-track{ background:var(--dark2); }
::-webkit-scrollbar-thumb{ background:var(--gold-dark); border-radius:4px; }
::-webkit-scrollbar-thumb:hover{ background:var(--gold); }

h1,h2,h3,h4{ font-weight:700; line-height:1.15; }
small{ color:var(--gray3); }
.right{ text-align:right; }
.center{ text-align:center; }
.txt-verde{ color:var(--green-l); } .txt-amar{ color:var(--amber); } .txt-rojo{ color:var(--red-light); }
.vacio{ text-align:center; color:var(--gray2); padding:26px; font-style:italic; }

/* ---------- Título de sección tipo Cinzel ---------- */
.sec-title{
  font-family:'Cinzel',serif; font-weight:700; font-size:1.35rem; color:var(--gold);
  letter-spacing:1.5px; text-transform:uppercase; margin-bottom:18px;
  display:flex; align-items:center; gap:10px;
}

/* ==========================================================================
   INPUTS Y BOTONES
   ========================================================================== */
.inp{
  width:100%; background:rgba(255,255,255,.05); border:1px solid rgba(212,175,55,.2);
  border-radius:var(--radio-sm); padding:12px 15px; color:var(--white);
  font-family:'Inter',sans-serif; font-size:14px; outline:none;
  transition:border-color .2s, box-shadow .2s; margin:6px 0;
}
.inp:focus{ border-color:var(--gold); box-shadow:0 0 0 3px rgba(212,175,55,.1); }
.inp::placeholder{ color:var(--gray2); }
select.inp option{ background:var(--dark2); }
.inp.num{ font-variant-numeric:tabular-nums; font-weight:600; letter-spacing:.5px; }
.lbl{ display:block; font-size:11px; text-transform:uppercase; letter-spacing:1.5px;
  color:var(--gold-dark); margin:8px 0 4px; font-weight:600; }
.hint{ text-align:right; font-size:.78rem; color:var(--gold-light); min-height:16px;
  font-variant-numeric:tabular-nums; }

button{ font-family:'Inter',sans-serif; cursor:pointer; border:none; }
.btn-primary{
  display:inline-flex; align-items:center; justify-content:center; gap:7px;
  background:linear-gradient(135deg,var(--red),var(--red-dark)); color:#fff;
  padding:11px 20px; border-radius:var(--radio-sm); font-size:14px; font-weight:600;
  border:1px solid rgba(255,255,255,.08); box-shadow:0 6px 16px rgba(192,57,43,.4);
  transition:all .18s;
}
.btn-primary:hover{ background:linear-gradient(135deg,var(--red-light),var(--red));
  transform:translateY(-2px); box-shadow:0 8px 22px rgba(192,57,43,.5); }
.btn-primary:disabled{ opacity:.4; cursor:not-allowed; transform:none; box-shadow:none; }
.btn-secondary{
  display:inline-flex; align-items:center; justify-content:center; gap:7px;
  background:linear-gradient(135deg,var(--gold-light),var(--gold-dark)); color:var(--black);
  padding:11px 20px; border-radius:var(--radio-sm); font-size:14px; font-weight:700;
  box-shadow:var(--shadow-gold); transition:all .18s;
}
.btn-secondary:hover{ filter:brightness(1.1); transform:translateY(-2px);
  box-shadow:0 8px 26px rgba(212,175,55,.3); }
.btn-block{ width:100%; display:flex; margin-top:12px; }
.btn-mini{
  display:inline-flex; align-items:center; gap:5px;
  background:rgba(255,255,255,.03); color:var(--gray3); border:1px solid var(--dark4);
  padding:7px 12px; border-radius:7px; font-size:12px; font-weight:600;
  transition:all .15s; margin:2px;
}
.btn-mini:hover{ border-color:var(--gold-dark); color:var(--gold); background:rgba(212,175,55,.06); }

/* ==========================================================================
   LOGIN / BLOQUEO
   ========================================================================== */
.login-wrap{ min-height:100vh; display:flex; align-items:center; justify-content:center;
  padding:20px; background:radial-gradient(ellipse at 30% 50%, #1a0505 0%, #0A0A0A 70%); }
.login-card{
  background:linear-gradient(145deg,#1a0a0a,#111); border:1px solid rgba(212,175,55,.3);
  border-radius:16px; padding:44px 38px; width:420px; max-width:95vw;
  box-shadow:0 0 80px rgba(192,57,43,.2), var(--shadow); text-align:center;
  animation:fade .5s ease;
}
@keyframes fade{ from{ opacity:0; transform:translateY(16px);} to{ opacity:1; transform:none;} }
.login-logo{ width:120px; height:120px; object-fit:contain; margin:0 auto 14px; display:block;
  filter:drop-shadow(0 0 14px rgba(212,175,55,.35)); }
.login-card h1{ font-family:'Cinzel',serif; font-size:22px; font-weight:700; color:var(--gold);
  letter-spacing:3px; text-transform:uppercase; }
.login-sub{ font-size:11px; color:var(--gray2); letter-spacing:3px; text-transform:uppercase;
  margin:6px 0 24px; }
.login-error{ color:var(--red-light); font-size:.86rem; min-height:20px; margin-top:10px; }
.login-demo{ font-size:.72rem; color:var(--gray3); margin-top:18px; line-height:1.7;
  background:rgba(0,0,0,.3); padding:10px 12px; border-radius:8px; border:1px solid rgba(212,175,55,.1); }
.login-foot{ margin-top:18px; font-size:.7rem; color:var(--gray); letter-spacing:1px; }

/* ==========================================================================
   TOPBAR
   ========================================================================== */
.topbar{
  display:flex; align-items:center; justify-content:space-between; padding:13px 22px;
  background:rgba(10,10,10,.95); border-bottom:1px solid rgba(212,175,55,.12);
  backdrop-filter:blur(10px); position:sticky; top:0; z-index:50;
}
.brand{ display:flex; align-items:center; gap:12px; }
.brand-logo{ width:42px; height:42px; object-fit:contain;
  filter:drop-shadow(0 0 8px rgba(212,175,55,.3)); }
.brand-name{ font-family:'Cinzel',serif; font-weight:700; font-size:1.05rem; color:var(--gold);
  letter-spacing:2px; line-height:1; text-transform:uppercase; }
.brand-sub{ font-size:.66rem; color:var(--gray2); margin-top:3px; letter-spacing:2px; text-transform:uppercase; }
.topbar-info{ display:flex; align-items:center; gap:10px; flex-wrap:wrap; justify-content:flex-end; }
.reloj{ font-variant-numeric:tabular-nums; font-weight:600; color:var(--gray3); font-size:.95rem; letter-spacing:1px; }
.caja-estado{ font-size:.78rem; font-weight:600; padding:5px 12px; border-radius:20px; }
.caja-estado.abierta{ background:rgba(39,174,96,.15); color:var(--green-l); border:1px solid rgba(39,174,96,.3); }
.caja-estado.cerrada{ background:rgba(192,57,43,.2); color:var(--red-light); border:1px solid rgba(192,57,43,.3); }
.badge-alerta{ background:rgba(230,126,34,.15); color:var(--amber); font-size:.76rem;
  padding:5px 10px; border-radius:20px; border:1px solid rgba(230,126,34,.3); font-weight:600; }
.user-chip{ display:flex; align-items:center; gap:8px; background:rgba(255,255,255,.04);
  color:var(--light); font-size:.8rem; padding:5px 12px 5px 6px; border-radius:20px;
  border:1px solid rgba(212,175,55,.12); }
.user-chip::before{ content:attr(data-ini); width:26px; height:26px; border-radius:50%;
  background:linear-gradient(135deg,var(--red),var(--red-dark)); color:#fff; font-weight:700;
  font-size:.72rem; display:flex; align-items:center; justify-content:center; }

/* ==========================================================================
   LAYOUT (sidebar + contenido)
   ========================================================================== */
.main{ display:flex; min-height:calc(100vh - 69px); }
.sidebar{ width:210px; flex-shrink:0; background:linear-gradient(180deg,#0f0505,#0A0A0A);
  border-right:1px solid rgba(212,175,55,.14); padding:14px 10px; display:flex; flex-direction:column; gap:4px; }
.nav-item{ display:flex; align-items:center; gap:11px; padding:11px 13px; border-radius:8px;
  cursor:pointer; transition:all .15s; color:var(--gray3); font-size:13px; font-weight:500;
  border:1px solid transparent; text-align:left; width:100%; }
.nav-item:hover{ background:rgba(212,175,55,.08); color:var(--white); }
.nav-item.activo{ background:linear-gradient(135deg,rgba(192,57,43,.3),rgba(192,57,43,.08));
  color:var(--gold); border-color:rgba(212,175,55,.2); }
.nav-ico{ font-size:1.15rem; width:22px; text-align:center; }
.content-area{ flex:1; padding:22px; overflow-x:hidden; }

/* ==========================================================================
   CARDS
   ========================================================================== */
.card{ background:linear-gradient(145deg,var(--dark2),var(--dark));
  border:1px solid rgba(212,175,55,.12); border-radius:var(--radio); padding:22px;
  margin-bottom:20px; box-shadow:var(--shadow); }
.card h3{ font-family:'Cinzel',serif; font-size:.95rem; font-weight:600; color:var(--gold);
  letter-spacing:1px; text-transform:uppercase; margin-bottom:16px; }
.card h4{ color:var(--white); font-size:.95rem; margin:14px 0 8px; }
hr,.divider{ border:none; border-top:1px solid rgba(212,175,55,.1); margin:14px 0; }

/* ==========================================================================
   AVISOS
   ========================================================================== */
.aviso-caja{ text-align:center; padding:50px 20px; }
.aviso-caja h2{ font-family:'Cinzel',serif; color:var(--gold); margin-bottom:12px; letter-spacing:1px; }
.aviso-caja p{ color:var(--light); margin-bottom:20px; }

/* ==========================================================================
   PEDIDOS — tipo, mesas
   ========================================================================== */
.tipo-pedido{ display:flex; gap:12px; margin-bottom:22px; flex-wrap:wrap; }
.btn-tipo{ flex:1; min-width:150px; padding:22px; border-radius:var(--radio);
  background:linear-gradient(145deg,var(--dark2),var(--dark)); border:1px solid rgba(212,175,55,.14);
  color:var(--white); font-size:1.05rem; font-weight:600; transition:all .15s; }
.btn-tipo:hover{ border-color:var(--gold); color:var(--gold); transform:translateY(-2px); box-shadow:var(--shadow-lg); }
.mesas-grid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(130px,1fr)); gap:12px; }
.mesa{ aspect-ratio:1.25; display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:6px; border-radius:var(--radio); border:1px solid var(--dark4);
  background:linear-gradient(145deg,var(--dark3),var(--dark)); transition:all .15s; box-shadow:var(--shadow); }
.mesa.libre:hover{ border-color:var(--gold); transform:translateY(-3px); box-shadow:var(--shadow-lg); }
.mesa.ocupada{ background:linear-gradient(145deg,rgba(192,57,43,.28),var(--dark2)); border-color:rgba(192,57,43,.5); }
.mesa-n{ font-family:'Cinzel',serif; font-weight:600; font-size:1.05rem; color:var(--white); }
.mesa-st{ font-size:.82rem; color:var(--gray3); font-variant-numeric:tabular-nums; }
.mesa.ocupada .mesa-st{ color:var(--gold-light); font-weight:600; }

/* ==========================================================================
   PEDIDO EN CURSO — menú + ticket
   ========================================================================== */
.pedido-layout{ display:grid; grid-template-columns:1fr 370px; gap:18px; align-items:start; }
.menu-col{ min-width:0; }
.cat-tabs{ display:flex; gap:7px; flex-wrap:wrap; margin-bottom:12px; }
.cat-tab{ padding:7px 14px; border-radius:20px; border:1px solid var(--dark4); background:transparent;
  color:var(--gray3); font-size:12px; font-weight:600; transition:all .15s; }
.cat-tab:hover{ color:var(--gold); }
.cat-tab.activo{ background:rgba(212,175,55,.1); border-color:var(--gold-dark); color:var(--gold); }
.prod-grid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:10px; margin-top:12px; }
.prod{ display:flex; flex-direction:column; align-items:flex-start; gap:6px; padding:14px;
  background:var(--dark2); border:1px solid rgba(212,175,55,.1); border-radius:8px; text-align:left;
  transition:all .15s; position:relative; min-height:82px; }
.prod:hover:not(:disabled){ border-color:var(--gold); background:rgba(212,175,55,.06); transform:translateY(-2px); }
.prod-n{ font-weight:500; font-size:.9rem; color:var(--light); line-height:1.3; }
.prod-p{ font-weight:700; color:var(--gold); font-variant-numeric:tabular-nums; margin-top:auto; }
.prod.agotado{ opacity:.45; cursor:not-allowed; }
.prod-ag{ position:absolute; top:8px; right:8px; background:var(--red); color:#fff; font-size:.6rem;
  padding:2px 6px; border-radius:4px; font-weight:700; }

.ticket-col{ background:var(--dark2); border:1px solid rgba(212,175,55,.12); border-radius:var(--radio);
  padding:16px; position:sticky; top:88px; box-shadow:var(--shadow); }
.ticket-head{ display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; }
.ticket-head h3{ font-family:'Cinzel',serif; color:var(--gold); font-size:1.05rem; letter-spacing:1px; }
.campos-cliente{ margin-bottom:12px; }
.cli-row{ display:flex; gap:8px; }
.cli-row .inp{ flex:1; }
.sugerencias{ margin-top:4px; }
.sug-item{ padding:8px 10px; background:var(--dark3); border:1px solid rgba(212,175,55,.12);
  border-radius:7px; margin-bottom:4px; cursor:pointer; font-size:.82rem; transition:all .12s; }
.sug-item:hover{ border-color:var(--gold); background:rgba(212,175,55,.06); }
.sug-item small{ display:block; color:var(--gray3); }
.ticket-items{ max-height:36vh; overflow-y:auto; margin:12px 0; border-top:1px solid rgba(212,175,55,.1);
  border-bottom:1px solid rgba(212,175,55,.1); padding:8px 0; }
.linea-item{ display:grid; grid-template-columns:auto 1fr auto auto; gap:8px; align-items:center;
  padding:8px 0; font-size:.88rem; border-bottom:1px solid rgba(255,255,255,.04); }
.li-cant{ font-weight:700; color:var(--gold-light); }
.li-nom{ color:var(--white); }
.li-sub{ font-variant-numeric:tabular-nums; font-weight:600; color:var(--light); }
.li-del{ background:transparent; color:var(--red-light); font-size:.95rem; padding:2px 7px; border-radius:5px; }
.li-del:hover{ background:rgba(192,57,43,.2); }
.ticket-obs{ margin:8px 0; }
.ticket-total{ display:flex; justify-content:space-between; align-items:center; padding:12px 0;
  font-size:1.05rem; font-weight:700; }
.tt-val{ color:var(--gold); font-size:1.35rem; font-variant-numeric:tabular-nums; font-family:'Cinzel',serif; }
.ticket-acciones{ display:flex; flex-direction:column; gap:8px; }
.chip-servida{ margin-top:10px; background:rgba(39,174,96,.15); color:var(--green-l); font-size:.78rem;
  padding:8px 10px; border-radius:8px; text-align:center; border:1px solid rgba(39,174,96,.3); }

/* ==========================================================================
   MODALES
   ========================================================================== */
.modal-bg{ position:fixed; inset:0; background:rgba(0,0,0,.8); backdrop-filter:blur(4px);
  display:none; align-items:center; justify-content:center; z-index:1000; padding:20px; }
.modal-bg.show{ display:flex; animation:fadeIn .2s ease; }
@keyframes fadeIn{ from{ opacity:0;} to{ opacity:1;} }
.modal-card{ width:100%; max-width:600px; max-height:90vh; overflow-y:auto;
  background:linear-gradient(145deg,var(--dark2),var(--dark)); border:1px solid rgba(212,175,55,.2);
  border-radius:var(--radio-lg); padding:24px; box-shadow:var(--shadow-lg); animation:slideUp .25s ease; }
@keyframes slideUp{ from{ transform:translateY(16px); opacity:0;} to{ transform:none; opacity:1;} }
.modal-card h3{ font-family:'Cinzel',serif; color:var(--gold); font-size:1.05rem; letter-spacing:1px;
  margin-bottom:16px; }
.modal-acc{ display:flex; gap:10px; justify-content:flex-end; margin-top:18px; flex-wrap:wrap; }

/* ==========================================================================
   COBRO
   ========================================================================== */
.cobro-total{ background:rgba(0,0,0,.3); padding:12px; border-radius:8px; text-align:center;
  font-size:1.05rem; margin-bottom:14px; border:1px solid rgba(212,175,55,.1); }
.cobro-total b{ color:var(--gold); font-size:1.3rem; }
.cobro-sec{ background:rgba(0,0,0,.2); border:1px solid rgba(212,175,55,.12); border-radius:var(--radio-sm);
  padding:14px; margin-bottom:12px; }
.cobro-sec-tit{ font-size:.82rem; font-weight:700; color:var(--gold-light); margin-bottom:8px;
  text-transform:uppercase; letter-spacing:.5px; }
.cobro-sec-tit small{ font-weight:400; text-transform:none; }
.cobro-row{ display:grid; grid-template-columns:90px 1fr; gap:8px; align-items:center; margin-bottom:4px; }
.cobro-row label{ font-size:.82rem; color:var(--light); }
.cobro-row select.inp{ grid-column:2; }
.cobro-check{ text-align:center; font-size:.85rem; font-weight:600; padding:7px; border-radius:6px; margin-top:6px; }
.cobro-check.ok{ background:rgba(39,174,96,.15); color:var(--green-l); }
.cobro-check.falta{ background:rgba(192,57,43,.2); color:var(--red-light); }
.cobro-check.sobra{ background:rgba(230,126,34,.15); color:var(--amber); }

/* ==========================================================================
   COCINA / KDS
   ========================================================================== */
.cocina-vacio{ text-align:center; padding:50px; }
.cocina-vacio h2{ font-family:'Cinzel',serif; color:var(--gold); margin-bottom:10px; letter-spacing:1px; }
.kds-grid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(270px,1fr)); gap:15px; }
.kds-card{ background:var(--dark2); border:2px solid var(--dark4); border-radius:10px; padding:15px;
  transition:border-color .3s; box-shadow:var(--shadow); }
.kds-card.verde{ border-color:rgba(39,174,96,.6); }
.kds-card.amarillo{ border-color:rgba(230,126,34,.7); }
.kds-card.rojo{ border-color:rgba(192,57,43,.8); animation:pulse 1.5s infinite; }
@keyframes pulse{ 0%,100%{ box-shadow:0 0 0 0 rgba(192,57,43,.4);} 50%{ box-shadow:0 0 0 6px rgba(192,57,43,0);} }
.kds-card.preparando{ background:linear-gradient(160deg,rgba(230,126,34,.08),var(--dark2)); }
.kds-head{ display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; }
.kds-orden{ font-family:'Cinzel',serif; font-weight:700; font-size:1.5rem; color:var(--gold); }
.kds-timer{ font-weight:700; font-size:1rem; padding:3px 12px; border-radius:14px; font-variant-numeric:tabular-nums; }
.kds-timer.verde{ background:rgba(39,174,96,.15); color:var(--green-l); }
.kds-timer.amarillo{ background:rgba(230,126,34,.15); color:var(--amber); }
.kds-timer.rojo{ background:rgba(192,57,43,.2); color:var(--red-light); }
.kds-dest{ font-weight:700; color:var(--white); margin-bottom:8px; font-size:.95rem; }
.kds-aviso{ background:var(--gold); color:var(--black); font-weight:800; text-align:center; padding:6px;
  border-radius:6px; margin-bottom:8px; font-size:.85rem; animation:pulse 1.2s infinite; }
.kds-items{ list-style:none; margin-bottom:10px; }
.kds-items li{ padding:6px 0; font-size:1rem; color:var(--light); border-bottom:1px solid rgba(255,255,255,.05); }
.kds-items li:last-child{ border-bottom:none; }
.kds-nuevo{ background:var(--gold); color:var(--black) !important; font-weight:800; padding:5px 8px !important;
  border-radius:5px; margin:3px 0; }
.kds-obs{ font-size:.82rem; color:var(--light); background:rgba(0,0,0,.25); padding:6px 8px;
  border-radius:6px; margin-bottom:10px; }
.kds-acc{ display:flex; flex-wrap:wrap; gap:6px; }

/* ==========================================================================
   CAJA
   ========================================================================== */
.caja-grid{ display:grid; grid-template-columns:1fr 1fr; gap:18px; }
.tabla-caja{ width:100%; border-collapse:collapse; }
.tabla-caja td{ padding:9px 4px; border-bottom:1px solid rgba(255,255,255,.05); font-size:.9rem; color:var(--light); }
.tabla-caja td.right{ font-variant-numeric:tabular-nums; font-weight:600; }
.fila-total td{ border-top:2px solid var(--gold-dark); border-bottom:none; padding-top:12px;
