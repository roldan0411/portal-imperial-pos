<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#faf6ee">
<title>Portal Imperial · POS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Serif+SC:wght@600;700;900&display=swap" rel="stylesheet">
<style>
/* ==========================================================================
   PORTAL IMPERIAL — Tema visual
   Identidad: laca roja imperial + dorado + tinta. Display en Noto Serif SC
   (evoca la caligrafía de la casa), cuerpo en Inter para legibilidad de POS.
   ========================================================================== */
:root{
  --tinta:        #faf6ee;   /* fondo general (cremita suave) */
  --laca:         #ffffff;   /* paneles/cards (blanco) */
  --laca-2:       #fbf7f0;   /* superficies elevadas */
  --laca-borde:   #e7ddc9;   /* bordes suaves */
  --rojo:         #9e1b1b;   /* rojo imperial */
  --rojo-vivo:    #c62828;
  --oro:          #b8901f;   /* dorado (un poco más oscuro para leerse sobre blanco) */
  --oro-suave:    #9c7a1a;
  --crema:        #f3e9d8;
  --texto:        #2a2018;   /* texto principal oscuro */
  --texto-2:      #6b5d4c;   /* texto secundario */
  --texto-3:      #9a8b78;   /* texto tenue */
  --verde:        #2e8b40;
  --verde-bg:     #e4f4e7;
  --amar:         #a9781a;
  --amar-bg:      #f8eecd;
  --rojo-al:      #c62828;
  --rojo-bg:      #fbe3e3;
  --sombra:       0 6px 20px rgba(90,60,20,.10);
  --radio:        14px;
  --radio-sm:     9px;
}
*{ box-sizing:border-box; margin:0; padding:0; }
html,body{ height:100%; }
body{
  font-family:'Inter',system-ui,sans-serif;
  background:
    radial-gradient(1200px 600px at 80% -10%, rgba(158,27,27,.05), transparent 60%),
    radial-gradient(900px 500px at -10% 110%, rgba(184,144,31,.06), transparent 55%),
    var(--tinta);
  color:var(--texto);
  -webkit-font-smoothing:antialiased;
  overflow-x:hidden;
}
#app{ min-height:100vh; }
::-webkit-scrollbar{ width:10px; height:10px; }
::-webkit-scrollbar-track{ background:var(--laca); }
::-webkit-scrollbar-thumb{ background:var(--laca-borde); border-radius:6px; }
::-webkit-scrollbar-thumb:hover{ background:var(--rojo); }

/* ---------- Tipografía utilitaria ---------- */
h1,h2,h3,h4{ font-weight:700; line-height:1.15; }
.sec-title{
  font-family:'Noto Serif SC',serif; font-weight:900;
  font-size:1.5rem; color:var(--oro); margin-bottom:16px;
  letter-spacing:.5px;
}
small{ color:var(--texto-3); }

/* ==========================================================================
   LOGIN / BLOQUEO
   ========================================================================== */
.login-wrap{
  min-height:100vh; display:flex; align-items:center; justify-content:center;
  padding:20px;
}
.login-card{
  width:100%; max-width:400px; background:linear-gradient(160deg,var(--laca-2),var(--laca));
  border:1px solid var(--laca-borde); border-radius:var(--radio);
  padding:38px 30px; text-align:center; box-shadow:var(--sombra);
  position:relative; overflow:hidden;
}
.login-card::before{
  content:""; position:absolute; inset:0; padding:1px; border-radius:var(--radio);
  background:linear-gradient(160deg,rgba(212,175,55,.5),transparent 40%);
  -webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);
  -webkit-mask-composite:xor; mask-composite:exclude; pointer-events:none;
}
.login-logo{ width:110px; height:110px; object-fit:contain; margin-bottom:14px;
  filter:drop-shadow(0 4px 12px rgba(90,60,20,.18)); }
.login-card h1{ font-family:'Noto Serif SC',serif; font-size:1.7rem; color:var(--oro); }
.login-sub{ color:var(--texto-2); font-size:.9rem; margin:6px 0 22px; }
.login-error{ color:var(--rojo-al); font-size:.86rem; min-height:20px; margin-top:10px; }
.login-demo{ font-size:.72rem; color:var(--texto-3); margin-top:16px; line-height:1.6;
  background:var(--laca-2); padding:8px 10px; border-radius:8px; border:1px solid var(--laca-borde); }
.login-foot{ margin-top:18px; font-size:.7rem; color:var(--texto-3); letter-spacing:.5px; }

/* ==========================================================================
   INPUTS Y BOTONES
   ========================================================================== */
.inp{
  width:100%; padding:12px 14px; margin:7px 0;
  background:var(--tinta); border:1px solid var(--laca-borde);
  border-radius:var(--radio-sm); color:var(--texto); font-size:.95rem;
  font-family:inherit; transition:border-color .15s, box-shadow .15s;
}
.inp:focus{ outline:none; border-color:var(--oro);
  box-shadow:0 0 0 3px rgba(212,175,55,.15); }
.inp::placeholder{ color:var(--texto-3); }
select.inp{ cursor:pointer; }
.inp.num{ font-variant-numeric:tabular-nums; font-weight:600; letter-spacing:.5px; }
.lbl{ display:block; text-align:left; font-size:.8rem; color:var(--texto-2);
  margin-top:8px; font-weight:500; }
.hint{ text-align:right; font-size:.78rem; color:var(--oro-suave);
  min-height:16px; font-variant-numeric:tabular-nums; margin-top:-4px; }

button{ font-family:inherit; cursor:pointer; border:none; }
.btn-primary{
  background:linear-gradient(135deg,var(--rojo-vivo),var(--rojo));
  color:#fff; padding:12px 20px; border-radius:var(--radio-sm);
  font-weight:700; font-size:.95rem; letter-spacing:.3px;
  box-shadow:0 4px 14px rgba(158,27,27,.35); transition:transform .1s, box-shadow .15s;
}
.btn-primary:hover{ transform:translateY(-1px); box-shadow:0 6px 20px rgba(158,27,27,.5); }
.btn-primary:active{ transform:translateY(0); }
.btn-primary:disabled{ opacity:.4; cursor:not-allowed; transform:none; box-shadow:none; }
.btn-secondary{
  background:var(--laca-2); color:var(--oro-suave); padding:12px 20px;
  border:1px solid var(--laca-borde); border-radius:var(--radio-sm); font-weight:600;
  transition:border-color .15s, color .15s;
}
.btn-secondary:hover{ border-color:var(--oro); color:var(--oro); }
.btn-block{ width:100%; display:block; margin-top:12px; }
.btn-mini{
  background:var(--laca-2); color:var(--texto-2); padding:6px 11px;
  border:1px solid var(--laca-borde); border-radius:7px; font-size:.8rem;
  font-weight:600; transition:all .12s; margin:2px;
}
.btn-mini:hover{ border-color:var(--oro); color:var(--oro); }

/* ==========================================================================
   TOPBAR
   ========================================================================== */
.topbar{
  display:flex; align-items:center; justify-content:space-between;
  padding:10px 20px; background:linear-gradient(180deg,var(--laca-2),var(--laca));
  border-bottom:1px solid var(--laca-borde); position:sticky; top:0; z-index:50;
  box-shadow:0 2px 12px rgba(90,60,20,.08);
}
.brand{ display:flex; align-items:center; gap:12px; }
.brand-logo{ width:46px; height:46px; object-fit:contain;
  filter:drop-shadow(0 2px 6px rgba(90,60,20,.15)); }
.brand-name{ font-family:'Noto Serif SC',serif; font-weight:900;
  font-size:1.15rem; color:var(--oro); line-height:1; }
.brand-sub{ font-size:.72rem; color:var(--texto-3); margin-top:2px; }
.topbar-info{ display:flex; align-items:center; gap:10px; flex-wrap:wrap; justify-content:flex-end; }
.reloj{ font-variant-numeric:tabular-nums; font-weight:700; color:var(--oro-suave);
  font-size:1rem; letter-spacing:1px; }
.caja-estado{ font-size:.8rem; font-weight:600; padding:5px 12px; border-radius:20px; }
.caja-estado.abierta{ background:var(--verde-bg); color:var(--verde); border:1px solid #b6e0bd; }
.caja-estado.cerrada{ background:var(--rojo-bg); color:var(--rojo-al); border:1px solid #f0c0c0; }
.badge-alerta{ background:var(--amar-bg); color:var(--amar); font-size:.78rem;
  padding:5px 10px; border-radius:20px; border:1px solid #e6d18a; font-weight:600; }
.user-chip{ background:var(--laca); color:var(--texto-2); font-size:.8rem;
  padding:5px 12px; border-radius:20px; border:1px solid var(--laca-borde); font-weight:500; }

/* ==========================================================================
   LAYOUT PRINCIPAL (sidebar + contenido)
   ========================================================================== */
.main{ display:flex; min-height:calc(100vh - 67px); }
.sidebar{
  width:120px; flex-shrink:0; background:var(--laca);
  border-right:1px solid var(--laca-borde); padding:14px 8px;
  display:flex; flex-direction:column; gap:6px;
}
.nav-item{
  display:flex; flex-direction:column; align-items:center; gap:5px;
  padding:12px 4px; background:transparent; border-radius:var(--radio-sm);
  color:var(--texto-3); font-size:.74rem; font-weight:600; transition:all .15s;
  border:1px solid transparent;
}
.nav-item:hover{ background:var(--laca-2); color:var(--texto); }
.nav-item.activo{ background:linear-gradient(135deg,rgba(158,27,27,.25),rgba(212,175,55,.1));
  color:var(--oro); border-color:var(--laca-borde); }
.nav-ico{ font-size:1.4rem; }
.content-area{ flex:1; padding:22px; overflow-x:hidden; }

/* ==========================================================================
   CARDS Y SECCIONES
   ========================================================================== */
.card{
  background:linear-gradient(160deg,var(--laca-2),var(--laca));
  border:1px solid var(--laca-borde); border-radius:var(--radio);
  padding:20px; margin-bottom:18px; box-shadow:var(--sombra);
}
.card h3{ color:var(--oro-suave); font-size:1.05rem; margin-bottom:14px;
  font-family:'Noto Serif SC',serif; }
.card h4{ color:var(--texto); font-size:.95rem; margin:14px 0 8px; }
.vacio{ text-align:center; color:var(--texto-3); padding:20px; font-style:italic; }
hr{ border:none; border-top:1px solid var(--laca-borde); margin:16px 0; }
.txt-verde{ color:var(--verde); } .txt-amar{ color:var(--amar); } .txt-rojo{ color:var(--rojo-al); }
.right{ text-align:right; }

/* ==========================================================================
   AVISOS
   ========================================================================== */
.aviso-caja, .caja-cerrada-wrap > p{ text-align:center; padding:40px 20px; }
.aviso-caja h2{ color:var(--oro); font-family:'Noto Serif SC',serif; margin-bottom:12px; }
.aviso-caja p{ color:var(--texto-2); margin-bottom:20px; }

/* ==========================================================================
   VISTA PEDIDOS — tipo, mesas
   ========================================================================== */
.tipo-pedido{ display:flex; gap:12px; margin-bottom:22px; flex-wrap:wrap; }
.btn-tipo{
  flex:1; min-width:150px; padding:20px; border-radius:var(--radio);
  background:linear-gradient(135deg,var(--laca-2),var(--laca));
  border:1px solid var(--laca-borde); color:var(--texto); font-size:1.05rem;
  font-weight:700; transition:all .15s;
}
.btn-tipo:hover{ border-color:var(--oro); color:var(--oro); transform:translateY(-2px); }
.mesas-grid{
  display:grid; grid-template-columns:repeat(auto-fill,minmax(130px,1fr)); gap:12px;
}
.mesa{
  aspect-ratio:1.2; display:flex; flex-direction:column; align-items:center;
  justify-content:center; gap:6px; border-radius:var(--radio);
  border:2px solid var(--laca-borde); background:var(--laca-2); transition:all .15s;
}
.mesa.libre:hover{ border-color:var(--oro); transform:translateY(-2px); }
.mesa.ocupada{ background:linear-gradient(135deg,rgba(158,27,27,.3),var(--laca-2));
  border-color:var(--rojo); }
.mesa-n{ font-weight:700; font-size:1.05rem; color:var(--texto); }
.mesa-st{ font-size:.85rem; color:var(--texto-2); font-variant-numeric:tabular-nums; }
.mesa.ocupada .mesa-st{ color:var(--oro-suave); font-weight:600; }

/* ==========================================================================
   PEDIDO EN CURSO — menú + ticket
   ========================================================================== */
.pedido-layout{ display:grid; grid-template-columns:1fr 380px; gap:18px; align-items:start; }
.menu-col{ min-width:0; }
.cat-tabs{ display:flex; gap:6px; flex-wrap:wrap; margin-bottom:12px; }
.cat-tab{
  padding:8px 15px; background:var(--laca-2); border:1px solid var(--laca-borde);
  border-radius:20px; color:var(--texto-2); font-size:.85rem; font-weight:600; transition:all .12s;
}
.cat-tab:hover{ color:var(--texto); }
.cat-tab.activo{ background:var(--rojo); color:#fff; border-color:var(--rojo); }
.prod-grid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(160px,1fr)); gap:10px; margin-top:12px; }
.prod{
  display:flex; flex-direction:column; align-items:flex-start; gap:6px; padding:14px;
  background:linear-gradient(160deg,var(--laca-2),var(--laca)); border:1px solid var(--laca-borde);
  border-radius:var(--radio-sm); text-align:left; transition:all .12s; position:relative; min-height:80px;
}
.prod:hover:not(:disabled){ border-color:var(--oro); transform:translateY(-2px); }
.prod-n{ font-weight:600; font-size:.9rem; color:var(--texto); line-height:1.25; }
.prod-p{ font-weight:700; color:var(--oro-suave); font-variant-numeric:tabular-nums; margin-top:auto; }
.prod.agotado{ opacity:.5; cursor:not-allowed; }
.prod-ag{ position:absolute; top:8px; right:8px; background:var(--rojo);
  color:#fff; font-size:.6rem; padding:2px 6px; border-radius:4px; font-weight:700; }

.ticket-col{ background:linear-gradient(160deg,var(--laca-2),var(--laca));
  border:1px solid var(--laca-borde); border-radius:var(--radio); padding:16px;
  position:sticky; top:80px; box-shadow:var(--sombra); }
.ticket-head{ display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; }
.ticket-head h3{ font-family:'Noto Serif SC',serif; color:var(--oro); font-size:1.15rem; }
.campos-cliente{ margin-bottom:12px; }
.cli-row{ display:flex; gap:8px; }
.cli-row .inp{ flex:1; }
.sugerencias{ margin-top:4px; }
.sug-item{ padding:8px 10px; background:var(--tinta); border:1px solid var(--laca-borde);
  border-radius:7px; margin-bottom:4px; cursor:pointer; font-size:.82rem; transition:all .12s; }
.sug-item:hover{ border-color:var(--oro); background:var(--laca-2); }
.sug-item small{ display:block; color:var(--texto-3); }
.ticket-items{ max-height:38vh; overflow-y:auto; margin:12px 0; border-top:1px dashed var(--laca-borde);
  border-bottom:1px dashed var(--laca-borde); padding:8px 0; }
.linea-item{ display:grid; grid-template-columns:auto 1fr auto auto; gap:8px; align-items:center;
  padding:7px 0; font-size:.88rem; }
.li-cant{ font-weight:700; color:var(--oro-suave); }
.li-nom{ color:var(--texto); }
.li-sub{ font-variant-numeric:tabular-nums; font-weight:600; color:var(--texto-2); }
.li-del{ background:transparent; color:var(--rojo-al); font-size:.9rem; padding:2px 6px; border-radius:5px; }
.li-del:hover{ background:var(--rojo-bg); }
.ticket-obs{ margin:8px 0; }
.ticket-total{ display:flex; justify-content:space-between; align-items:center;
  padding:12px 0; font-size:1.05rem; font-weight:700; }
.tt-val{ color:var(--oro); font-size:1.3rem; font-variant-numeric:tabular-nums; }
.ticket-acciones{ display:flex; flex-direction:column; gap:8px; }
.chip-servida{ margin-top:10px; background:var(--verde-bg); color:var(--verde); font-size:.78rem;
  padding:8px 10px; border-radius:8px; text-align:center; border:1px solid #b6e0bd; }

/* ==========================================================================
   MODALES
   ========================================================================== */
.modal-bg{ position:fixed; inset:0; background:rgba(0,0,0,.7); backdrop-filter:blur(3px);
  display:none; align-items:center; justify-content:center; z-index:100; padding:20px; }
.modal-bg.show{ display:flex; }
.modal-card{ width:100%; max-width:460px; max-height:90vh; overflow-y:auto;
  background:linear-gradient(160deg,var(--laca-2),var(--laca));
  border:1px solid var(--laca-borde); border-radius:var(--radio); padding:24px;
  box-shadow:var(--sombra); animation:modalIn .18s ease; }
@keyframes modalIn{ from{ opacity:0; transform:translateY(12px) scale(.98); } to{ opacity:1; transform:none; } }
.modal-card h3{ color:var(--oro); font-family:'Noto Serif SC',serif; margin-bottom:14px; }
.modal-acc{ display:flex; gap:10px; justify-content:flex-end; margin-top:18px; }
.modal-acc .btn-primary,.modal-acc .btn-secondary{ padding:10px 18px; }

/* ==========================================================================
   COBRO
   ========================================================================== */
.cobro-total{ background:var(--tinta); padding:12px; border-radius:8px; text-align:center;
  font-size:1.05rem; margin-bottom:14px; }
.cobro-total b{ color:var(--oro); font-size:1.25rem; }
.cobro-sec{ background:var(--laca-2); border:1px solid var(--laca-borde);
  border-radius:var(--radio-sm); padding:12px; margin-bottom:12px; }
.cobro-sec-tit{ font-size:.82rem; font-weight:700; color:var(--oro-suave); margin-bottom:8px; }
.cobro-sec-tit small{ font-weight:400; }
.cobro-row{ display:grid; grid-template-columns:90px 1fr; gap:8px; align-items:center; margin-bottom:4px; }
.cobro-row label{ font-size:.82rem; color:var(--texto-2); }
.cobro-row .inp{ margin:3px 0; }
.cobro-row select.inp{ grid-column:2; }
.cobro-check{ text-align:center; font-size:.85rem; font-weight:600; padding:6px; border-radius:6px; margin-top:6px; }
.cobro-check.ok{ background:var(--verde-bg); color:var(--verde); }
.cobro-check.falta{ background:var(--rojo-bg); color:var(--rojo-al); }
.cobro-check.sobra{ background:var(--amar-bg); color:var(--amar); }

/* ==========================================================================
   COCINA / KDS
   ========================================================================== */
.cocina-vacio{ text-align:center; padding:50px; }
.cocina-vacio h2{ font-family:'Noto Serif SC',serif; color:var(--oro); margin-bottom:10px; }
.kds-grid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(260px,1fr)); gap:14px; }
.kds-card{ background:var(--laca-2); border:1px solid var(--laca-borde); border-left:5px solid var(--texto-3);
  border-radius:var(--radio); padding:14px; box-shadow:var(--sombra); }
.kds-card.verde{ border-left-color:var(--verde); }
.kds-card.amarillo{ border-left-color:var(--amar); }
.kds-card.rojo{ border-left-color:var(--rojo-al); animation:pulseRojo 1.8s infinite; }
@keyframes pulseRojo{ 0%,100%{ box-shadow:var(--sombra); } 50%{ box-shadow:0 0 0 2px rgba(229,72,77,.4),var(--sombra); } }
.kds-card.preparando{ background:linear-gradient(160deg,rgba(217,165,32,.08),var(--laca-2)); }
.kds-head{ display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; }
.kds-orden{ font-family:'Noto Serif SC',serif; font-weight:900; font-size:1.4rem; color:var(--oro); }
.kds-timer{ font-weight:700; font-size:.95rem; padding:3px 10px; border-radius:14px; font-variant-numeric:tabular-nums; }
.kds-timer.verde{ background:var(--verde-bg); color:var(--verde); }
.kds-timer.amarillo{ background:var(--amar-bg); color:var(--amar); }
.kds-timer.rojo{ background:var(--rojo-bg); color:var(--rojo-al); }
.kds-dest{ font-weight:700; color:var(--texto); margin-bottom:8px; font-size:.95rem; }
.kds-aviso{ background:var(--oro); color:#1a0f0f; font-weight:800; text-align:center;
  padding:6px; border-radius:6px; margin-bottom:8px; font-size:.85rem; animation:pulseRojo 1.2s infinite; }
.kds-items{ list-style:none; margin-bottom:10px; }
.kds-items li{ padding:5px 0; font-size:1rem; border-bottom:1px dotted var(--laca-borde); }
.kds-items li:last-child{ border-bottom:none; }
.kds-nuevo{ background:var(--oro); color:#1a0f0f !important; font-weight:800; padding:5px 8px !important;
  border-radius:5px; margin:3px 0; border:2px solid #1a0f0f; }
.kds-obs{ font-size:.82rem; color:var(--texto-2); background:var(--tinta); padding:6px 8px;
  border-radius:6px; margin-bottom:10px; }
.kds-acc{ display:flex; flex-wrap:wrap; gap:6px; }

/* ==========================================================================
   CAJA
   ========================================================================== */
.caja-grid{ display:grid; grid-template-columns:1fr 1fr; gap:18px; }
.tabla-caja{ width:100%; border-collapse:collapse; }
.tabla-caja td{ padding:8px 4px; border-bottom:1px solid var(--laca-borde); font-size:.9rem; }
.tabla-caja td.right{ font-variant-numeric:tabular-nums; font-weight:600; }
.fila-total td{ border-top:2px solid var(--oro); border-bottom:none; padding-top:12px;
  font-weight:800; color:var(--oro); font-size:1.05rem; }
.mov-botones{ display:flex; flex-wrap:wrap; gap:8px; margin-bottom:14px; }
.tabla-mov,.tabla-hist,.tabla-ventas,.tabla-aud,.tabla-inv,.diag-tabla{ width:100%; border-collapse:collapse; font-size:.84rem; }
.tabla-mov th,.tabla-hist th,.tabla-ventas th,.tabla-aud th,.tabla-inv th,.diag-tabla th{
  text-align:left; padding:8px 6px; color:var(--texto-3); font-size:.76rem; text-transform:uppercase;
  letter-spacing:.5px; border-bottom:1px solid var(--laca-borde); }
.tabla-mov td,.tabla-hist td,.tabla-ventas td,.tabla-aud td,.tabla-inv td,.diag-tabla td{
  padding:8px 6px; border-bottom:1px solid rgba(58,32,32,.5); }
.tabla-mov th.right,.tabla-hist th.right,.tabla-ventas th.right,.tabla-inv th.right,.diag-tabla th.right{ text-align:right; }
.card-pend{ border-color:var(--amar); }

.dif-preview.amar{ background:var(--amar-bg); color:var(--amar); }

/* ==========================================================================

   ========================================================================== */
.kpi-grid{ display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:14px; margin-bottom:18px; }
.kpi{ background:linear-gradient(160deg,var(--laca-2),var(--laca)); border:1px solid var(--laca-borde);

.dash-cols{ display:grid; grid-template-columns:1fr 1fr; gap:18px; }

.barra{ width:100%; max-width:40px; background:linear-gradient(180deg,var(--oro),var(--rojo));

/* ==========================================================================

   ========================================================================== */
.tabla-inv td.right{ font-variant-numeric:tabular-nums; }

.tag-agotado{ background:var(--rojo); color:#fff; font-size:.7rem; padding:2px 8px; border-radius:4px; font-weight:700; }

/* ==========================================================================
   TOAST
   ========================================================================== */
.toast{ position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(100px);
